<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" role="img" aria-label="Hugging Face Space by Shadow Software">
  <title>Hugging Face Space</title>

  <defs>
    <linearGradient id="hfsSpark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c6f59b"/>
      <stop offset="55%" stop-color="#8fd468"/>
      <stop offset="100%" stop-color="#5aa63c"/>
    </linearGradient>
  </defs>

  <!-- Shadow Software hexagon: the house mark, signature green on near-black. -->
  <path d="M30 2.5 53 15.75v26.5L30 55.5 7 42.25v-26.5z"
        fill="#0d0d0d" stroke="#8fd468" stroke-width="2.8" stroke-linejoin="round"/>

  <!-- Prompt in, generation out. Deliberately only THREE shapes inside the hex:
       n8n renders this at ~40px on the canvas, and anything finer turns to mush. -->

  <!-- Prompt: two heavy text rules. -->
  <g fill="#ededed">
    <rect x="14.5" y="24" width="13" height="3.4" rx="1.7"/>
    <rect x="14.5" y="32" width="8.5" height="3.4" rx="1.7" opacity="0.6"/>
  </g>

  <!-- The generated artifact: one bold four-point spark, the "generated" cue.
       Sized to carry the glyph on its own when the rules blur away. -->
  <path d="M39.5 16.5c1.75 8.6 3.35 10.2 11.95 11.95C42.85 30.2 41.25 31.8 39.5 40.4c-1.75-8.6-3.35-10.2-11.95-11.95 8.6-1.75 10.2-3.35 11.95-11.95z"
        fill="url(#hfsSpark)"/>
</svg>
