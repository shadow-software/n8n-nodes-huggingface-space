<svg xmlns="http://www.w3.org/2000/svg" width="880" height="240" viewBox="0 0 880 240" role="img" aria-label="Hugging Face Space for n8n — by Shadow Software">
  <title>Hugging Face Space for n8n — by Shadow Software</title>

  <defs>
    <radialGradient id="bg" cx="18%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#12351c"/>
      <stop offset="45%" stop-color="#0b0b0b"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>

    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c6f59b"/>
      <stop offset="55%" stop-color="#8fd468"/>
      <stop offset="100%" stop-color="#5aa63c"/>
    </linearGradient>

    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="card"><rect x="0" y="0" width="880" height="240" rx="20"/></clipPath>
  </defs>

  <g clip-path="url(#card)">
    <rect width="880" height="240" fill="url(#bg)"/>

    <!-- Faint hexagon lattice, the house background motif. -->
    <g stroke="#8fd468" stroke-opacity="0.06" fill="none" stroke-width="2">
      <path d="M120 40 154 60v40l-34 20-34-20V60z"/>
      <path d="M760 150 794 170v40l-34 20-34-20v-40z"/>
      <path d="M700 30 724 44v28l-24 14-24-14V44z"/>
    </g>

    <!-- Shadow Software hexagon + hooded mark. -->
    <g transform="translate(70 60) scale(2.55)">
      <path d="M20 1.5 37 11.25v19.5L20 40.5 3 30.75v-19.5z" fill="#8fd468" opacity="0" filter="url(#soft)">
        <animate attributeName="opacity" values="0;0.35;0" dur="3.2s" repeatCount="indefinite"/>
      </path>
      <path d="M20 1.5 37 11.25v19.5L20 40.5 3 30.75v-19.5z"
            fill="#0d0d0d" stroke="#8fd468" stroke-width="2" stroke-linejoin="round"/>
      <path d="M20 11c-4.4 0-7.8 3.3-7.8 8 0 2.6 1.1 4.7 2.6 6.2-1.7 1.1-2.9 2.7-3.3 4.8h17c-.4-2.1-1.6-3.7-3.3-4.8 1.5-1.5 2.6-3.6 2.6-6.2 0-4.7-3.4-8-7.8-8z"
            fill="#ededed"/>
      <ellipse cx="20" cy="19.5" rx="3.6" ry="4.2" fill="#0d0d0d"/>
    </g>

    <!-- Prompt in → generation out. The node's whole story, animated once. -->
    <g transform="translate(250 120)">
      <!-- prompt lines type in -->
      <g fill="#ededed">
        <rect x="0" y="-22" width="74" height="7" rx="3.5">
          <animate attributeName="width" values="0;74" dur="0.7s" begin="0.2s" fill="freeze"/>
        </rect>
        <rect x="0" y="-6" width="52" height="7" rx="3.5" opacity="0.72">
          <animate attributeName="width" values="0;52" dur="0.7s" begin="0.45s" fill="freeze"/>
        </rect>
        <rect x="0" y="10" width="34" height="7" rx="3.5" opacity="0.45">
          <animate attributeName="width" values="0;34" dur="0.7s" begin="0.7s" fill="freeze"/>
        </rect>
      </g>

      <!-- arrow -->
      <g>
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.1s" fill="freeze"/>
        <path d="M92 -4h26" stroke="#8fd468" stroke-width="4" stroke-linecap="round"/>
        <path d="M115 -10l9 6-9 6z" fill="#8fd468"/>
      </g>

      <!-- the generated spark blooms -->
      <g transform="translate(158 -4)">
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.45s" fill="freeze"/>
        <g>
          <animateTransform attributeName="transform" type="scale" values="0.3;1.12;1" dur="0.7s" begin="1.45s" fill="freeze"
                            calcMode="spline" keySplines="0.34 1.56 0.64 1; 0.34 1.56 0.64 1"/>
          <path d="M0 -34c2.6 12.8 5 15.2 17.8 17.8C5 -13.6 2.6 -11.2 0 1.6c-2.6-12.8-5-15.2-17.8-17.8C-5 -18.8-2.6-21.2 0-34z"
                fill="url(#spark)"/>
        </g>
        <!-- slow twinkle -->
        <animateTransform attributeName="transform" type="rotate" values="0;8;0" dur="5s" begin="2.2s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>

    <!-- Wordmark -->
    <g font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
      <text x="470" y="104" font-size="40" font-weight="800" letter-spacing="-1" fill="#ffffff">Hugging Face <tspan fill="#8fd468">Space</tspan></text>
      <text x="472" y="140" font-size="22" font-weight="600" letter-spacing="0.5" fill="#c9c9c9">community node for n8n</text>
      <text x="472" y="172" font-size="14" font-weight="500" letter-spacing="0.4" fill="#7f7f7f">image · video · music · speech · text · moderation</text>
      <rect x="472" y="188" width="300" height="3" rx="1.5" fill="#8fd468">
        <animate attributeName="width" values="0;300" dur="1s" begin="1.6s" fill="freeze"/>
      </rect>
    </g>

    <!-- Shimmer sweep -->
    <rect x="-260" y="0" width="180" height="240" fill="url(#shine)" opacity="0.45" transform="skewX(-18)">
      <animate attributeName="x" values="-260;1000" dur="4.5s" begin="1.8s" repeatCount="indefinite"/>
    </rect>

    <rect x="1" y="1" width="878" height="238" rx="19" fill="none" stroke="#232323" stroke-width="2"/>
  </g>
</svg>
