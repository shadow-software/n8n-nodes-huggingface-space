name: Publish to npm

# n8n will not verify a community node published from a developer's laptop: from
# 2026-05-01 a verified package must be published by CI with an npm provenance
# statement, which cryptographically ties the tarball to this repo and this
# workflow run. Hence `id-token: write` and `--provenance` below.
#
# Setup, once, before the first release:
#   1. On npmjs.com, add this repo as a Trusted Publisher for the package
#      (Settings -> Trusted Publishers -> GitHub Actions, workflow: publish.yml).
#   2. Push a tag: `npm version patch && git push --follow-tags`.
# No NPM_TOKEN secret is needed — Trusted Publishing exchanges the OIDC token.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required to mint the provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node 22, NOT 20: npm's Trusted Publishing requires npm >= 11.5.1 and Node >=
      # 22.14.0. Node 20 ships an npm far older than that, and `npm publish` would
      # fail to exchange the OIDC token — an auth failure at the very last step, after
      # lint, tests and build had all passed, and only ever visible on a real release.
      # The node itself still SUPPORTS Node 20 at runtime (see CI, which tests both);
      # this pin is purely about the publishing toolchain.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # setup-node's bundled npm can lag; pin the floor Trusted Publishing needs.
      - name: Ensure an npm that supports Trusted Publishing
        run: |
          npm install -g npm@latest
          echo "npm $(npm --version) on node $(node --version)"
          node -e "
            const [maj, min, pat] = process.versions.node.split('.').map(Number);
            const ok = maj > 22 || (maj === 22 && (min > 14 || (min === 14 && pat >= 0)));
            if (!ok) { console.error('Node ' + process.versions.node + ' < 22.14.0 — Trusted Publishing will fail'); process.exit(1); }
          "

      # `n8n-workflow` pulls in `isolated-vm`, a native addon whose postinstall
      # compiles C++. We only need its type declarations, so skip install scripts
      # rather than install a toolchain to build something we never load.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Fails the release if `files`/.npmignore ever let a source or test file
      # into the tarball, or if dist is missing.
      - name: Verify package contents
        run: |
          npm pack --dry-run --json > /tmp/pack.json
          node -e "
            const files = require('/tmp/pack.json')[0].files.map(f => f.path);
            const stray = files.filter(f => !f.startsWith('dist/') && !/^(package\.json|README\.md|LICENSE\.md)$/.test(f));
            if (stray.length) {
              console.error('Unexpected files in the published tarball:', stray);
              process.exit(1);
            }
            if (!files.some(f => f.endsWith('.svg'))) {
              console.error('No SVG in the tarball — the node icon would be broken.');
              process.exit(1);
            }
            console.log('Tarball OK:', files.length, 'files');
          "

      - name: Publish
        run: npm publish --provenance --access public
